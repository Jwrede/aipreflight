# Telemetry contract for the hosted-API app.
# llm.py emits one structured record per LLM call with exactly these fields.
# aipreflight's app profile checks that every required field is declared here.
service: hosted-api-app
exporter: otlp
endpoint: http://localhost:4317
fields:
  - request_id
  - model
  - provider
  - prompt_version
  - input_tokens
  - output_tokens
  - latency_ms
  - cost_usd
  - error_type
