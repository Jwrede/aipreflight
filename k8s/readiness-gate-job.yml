apiVersion: batch/v1
kind: Job
metadata:
  name: aipreflight-gate
  labels:
    app: aipreflight
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: aipreflight
    spec:
      restartPolicy: Never
      containers:
        - name: gate
          image: golang:1.22-bookworm
          command:
            - /bin/bash
            - -c
            - |
              apt-get update
              apt-get install -y --no-install-recommends python3 python3-yaml git ca-certificates
              rm -rf /var/lib/apt/lists/*
              go install github.com/Jwrede/llmprobe@latest
              git clone https://github.com/Jwrede/aipreflight /work
              cd /work
              ./scripts/gate.sh configs/llmprobe/vllm-k8s.yml thresholds.yml 30s 5s
