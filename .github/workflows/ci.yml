name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Check Python syntax
        run: python -m py_compile aipreflight/*.py scripts/report.py scripts/diagnose.py scripts/compare.py

      - name: CLI smoke test (offline)
        run: |
          aipreflight check --profile profiles/inference.yml \
            --probes fixtures/sample-probes.jsonl --out runs/ci || [ $? -eq 1 ]
          test -f runs/ci/aipreflight-report.json
          aipreflight report runs/ci | head -1

      - name: App profile smoke test (tokentoll cost gate)
        run: |
          aipreflight check --profile profiles/app.yml --out runs/app-ci || [ $? -eq 1 ]
          test -f runs/app-ci/aipreflight-report.json
          aipreflight report runs/app-ci | head -1

  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install example deps
        run: pip install -r examples/hosted-api-app/requirements.txt pytest
      - name: Run example smoke tests and evals (offline)
        env:
          AIPREFLIGHT_FAKE_LLM: "1"
        run: python -m pytest examples/hosted-api-app -q

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck scripts/*.sh
