global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'vllm'
    metrics_path: '/metrics'
    static_configs:
      # Linux: use localhost or the container's host-gateway address
      - targets: ['host.docker.internal:8000']
      # If vLLM runs on the host directly (not Docker), use:
      #   - targets: ['localhost:8000']
